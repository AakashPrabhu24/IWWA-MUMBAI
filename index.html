    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .ripple-effect {
            position: relative;
            overflow: hidden;
        }
        
        .ripple-effect::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        
        .ripple-effect:active::after {
            transform: scale(0, 0);
            opacity: .3;
            transition: 0s;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }

        .btn-focus-shadow {
            box-shadow: 0 10px 30px -10px rgba(26, 115, 232, 0.4);
        }

        /* Page Transition Animations */
        body {
            animation: fadeInPage 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
        }
        body.page-exit {
            animation: fadeOutPage 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }
        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeOutPage {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

<body class="bg-white text-on-surface font-body-md overflow-x-hidden min-h-screen flex flex-col">

<!-- Main Content: Focused Hero -->
<main class="flex-grow flex items-center justify-center py-12 px-margin-mobile md:px-margin-desktop">
    <div class="max-w-4xl w-full text-center">
        <!-- Sole Focus Button -->
        <div class="relative group">
            <!-- Atmospheric background glow -->
            <div class="absolute -inset-4 bg-primary/5 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-700"></div>
            <button class="relative w-full md:w-auto inline-flex items-center justify-center gap-4 bg-primary text-on-primary px-8 md:px-12 py-6 md:py-10 rounded-lg md:rounded-xl shadow-xl hover:shadow-2xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] btn-focus-shadow ripple-effect group" style="transform: translate(-9.4px, -3.38px) rotateX(3.38deg) rotateY(-9.4deg);">
                <span class="font-headline-lg text-headline-md md:text-headline-lg tracking-tight">
                    Welcome to National Seminar URBAN WATER – ISSUES &amp; SOLUTIONS
                </span>
                <span class="material-symbols-outlined text-3xl md:text-4xl group-hover:translate-x-2 transition-transform duration-300">arrow_forward_ios</span>
            </button>
        </div>
    </div>
</main>

<!-- Interactive Layer for micro-interactions -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const mainButton = document.querySelector('main button');
        
        // Add subtle mouse-tracking movement for high-fidelity feel (desktop only)
        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.pageX) / 50;
                const y = (window.innerHeight / 2 - e.pageY) / 50;
                
                if (mainButton) {
                    mainButton.style.transform = `translate(${x}px, ${y}px) rotateX(${-y}deg) rotateY(${x}deg)`;
                }
            });

            // Reset transform on leave
            document.addEventListener('mouseleave', () => {
                if (mainButton) {
                    mainButton.style.transform = 'translate(0, 0) rotateX(0) rotateY(0)';
                }
            });
        }

        // Navigate on click with smooth page transition
        if (mainButton) {
            mainButton.addEventListener('click', () => {
                document.body.classList.add('page-exit');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 300);
            });
        }
    });
</script>
</body>
